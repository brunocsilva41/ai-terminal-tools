name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: CI Check
        run: npm run ci:check

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      package_name: ${{ steps.pack.outputs.package_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Pack
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(npm pack | tail -n1)"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          sha256sum "$PACKAGE_NAME" > "${PACKAGE_NAME}.sha256"

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: |
            ${{ steps.pack.outputs.package_name }}
            ${{ steps.pack.outputs.package_name }}.sha256
          if-no-files-found: error

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.pack.outputs.package_name }}

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: dist

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "Automated release for $TAG_NAME" \
            dist/*
