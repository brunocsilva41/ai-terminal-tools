name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - "20"
        python:
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Runtime Versions
        shell: bash
        run: |
          node --version
          python --version || python3 --version
          git --version

      - name: Doctor
        run: npm run doctor

      - name: Validate Contracts
        run: npm run validate:contracts

      - name: Core Smoke
        run: npm run smoke

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-debug-${{ matrix.os }}
          path: |
            core-scripts/context/scan_config.json
            core-scripts/context/PROJECTS_MAP.json
          if-no-files-found: ignore
