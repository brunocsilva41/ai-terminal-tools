name: Deploy - Manual

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Deployment strategy"
        required: true
        type: choice
        options:
          - artifact
          - npm
          - ghcr
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - development
          - staging
          - production
      ref:
        description: "Git ref (branch, tag or SHA)"
        required: true
        default: "main"
        type: string
      dry_run:
        description: "Plan/validate only (no publish/push)"
        required: true
        default: true
        type: boolean
      confirm_phrase:
        description: "Type DEPLOY to execute when dry_run=false"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}-${{ github.event.inputs.strategy }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.plan.outputs.strategy }}
      environment: ${{ steps.plan.outputs.environment }}
      ref: ${{ steps.plan.outputs.ref }}
      dry_run: ${{ steps.plan.outputs.dry_run }}
    steps:
      - name: Validate Inputs
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          STRATEGY="${{ inputs.strategy }}"
          TARGET_ENV="${{ inputs.environment }}"
          TARGET_REF="${{ inputs.ref }}"
          DRY_RUN="${{ inputs.dry_run }}"
          CONFIRM="${{ inputs.confirm_phrase }}"

          if [[ "$DRY_RUN" == "false" && "$CONFIRM" != "DEPLOY" ]]; then
            echo "To execute deployment set confirm_phrase=DEPLOY." >&2
            exit 1
          fi

          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"
          echo "environment=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

          {
            echo "## Deployment Plan"
            echo "- Strategy: \`$STRATEGY\`"
            echo "- Environment: \`$TARGET_ENV\`"
            echo "- Ref: \`$TARGET_REF\`"
            echo "- Dry run: \`$DRY_RUN\`"
            if [[ "$DRY_RUN" == "false" ]]; then
              echo "- Execution gate: confirmed with phrase \`DEPLOY\`"
            else
              echo "- Execution gate: no external publish will happen"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: CI Check
        run: npm run ci:check

  deploy-artifact:
    name: Deploy Artifact
    runs-on: ubuntu-latest
    needs: [plan, verify]
    if: ${{ needs.plan.outputs.strategy == 'artifact' }}
    environment:
      name: ${{ needs.plan.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: deploy-artifact-${{ github.run_id }}
          path: "*.tgz"
          if-no-files-found: error

  deploy-npm:
    name: Deploy npm
    runs-on: ubuntu-latest
    needs: [plan, verify]
    if: ${{ needs.plan.outputs.strategy == 'npm' }}
    environment:
      name: ${{ needs.plan.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate package is publishable
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if(p.private){console.error('package.json is private=true. Set private=false before npm publish.'); process.exit(1);} if(!p.name||!p.version){console.error('package.json must contain name and version.'); process.exit(1);} console.log('Package publish validation ok:', p.name, p.version);"

      - name: Dry Run
        if: ${{ needs.plan.outputs.dry_run == 'true' }}
        run: npm publish --provenance --access public --dry-run

      - name: Publish
        if: ${{ needs.plan.outputs.dry_run == 'false' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  deploy-ghcr:
    name: Deploy GHCR
    runs-on: ubuntu-latest
    needs: [plan, verify]
    if: ${{ needs.plan.outputs.strategy == 'ghcr' }}
    environment:
      name: ${{ needs.plan.outputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.plan.outputs.ref }}

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          test -f Dockerfile || { echo "Dockerfile not found in repository root."; exit 1; }

      - name: Set Image Tag
        id: vars
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}/universal-ai-terminal-tools:${GITHUB_SHA}"
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: ${{ needs.plan.outputs.dry_run == 'false' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build (dry run)
        if: ${{ needs.plan.outputs.dry_run == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.vars.outputs.image }}

      - name: Build and Push
        if: ${{ needs.plan.outputs.dry_run == 'false' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}

  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs: [plan, verify, deploy-artifact, deploy-npm, deploy-ghcr]
    if: always()
    steps:
      - name: Summary
        shell: bash
        run: |
          {
            echo "## Deployment Result"
            echo "- Strategy: \`${{ needs.plan.outputs.strategy }}\`"
            echo "- Environment: \`${{ needs.plan.outputs.environment }}\`"
            echo "- Ref: \`${{ needs.plan.outputs.ref }}\`"
            echo "- Dry run: \`${{ needs.plan.outputs.dry_run }}\`"
            echo "- Verify job: \`${{ needs.verify.result }}\`"
            echo "- Artifact job: \`${{ needs.deploy-artifact.result }}\`"
            echo "- npm job: \`${{ needs.deploy-npm.result }}\`"
            echo "- GHCR job: \`${{ needs.deploy-ghcr.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
