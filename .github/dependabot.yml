version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-root:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/wrappers/claude-mcp"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/wrappers/copilot-extensions"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
