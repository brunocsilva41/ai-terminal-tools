name: Bug report
description: Reportar falha funcional ou regressão
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que está quebrado?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste passos claros.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/Evidências
      description: Cole logs relevantes, sem segredos.
